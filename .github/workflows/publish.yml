name: Publish @botuyo/mcp to npm

on:
  push:
    branches: [main]
    paths: ['package.json']

concurrency:
  group: mcp-publish
  cancel-in-progress: true

jobs:
  publish:
    name: Build and publish @botuyo/mcp
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Cleanup orphaned processes
        shell: bash
        run: |
          # Kill any leftover processes from previous cancelled runs
          pkill -f "flock.*botuyo-locks/mcp" 2>/dev/null || true
          pkill -f "npm.*publish" 2>/dev/null || true
          if [ -f /tmp/botuyo-locks/mcp.lock ]; then
            LOCK_PID=$(flock -n /tmp/botuyo-locks/mcp.lock echo "free" 2>/dev/null)
            if [ "$LOCK_PID" = "free" ]; then
              rm -f /tmp/botuyo-locks/mcp.lock
            fi
          fi
          sleep 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Notify Deploy Started
        shell: bash
        env:
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
        run: |
          python3 << 'PYEOF'
          import smtplib, ssl, os
          from email.mime.text import MIMEText
          from datetime import datetime, timezone, timedelta

          ar = timezone(timedelta(hours=-3))
          now = datetime.now(ar).strftime('%d/%m/%Y %H:%M:%S')

          body = f"""🚀 MCP Publish INICIADO

          Inicio:  {now} (AR)
          Commit:  {os.environ.get('COMMIT_MSG', 'N/A')}
          SHA:     {os.environ['COMMIT_SHA'][:8]}
          Author:  {os.environ['ACTOR']}
          Run:     {os.environ['RUN_URL']}
          """

          msg = MIMEText(body)
          msg['Subject'] = f'🚀 [MCP] Publish iniciado — {now}'
          msg['From'] = 'BotUyo CI/CD <support@botuyo.com>'
          msg['To'] = os.environ['NOTIFICATION_EMAIL']

          ctx = ssl.create_default_context()
          with smtplib.SMTP_SSL('smtp.zoho.com', 465, context=ctx) as s:
              s.login('support@botuyo.com', os.environ['SMTP_PASSWORD'])
              s.send_message(msg)
          PYEOF

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Build + Publish (Exclusive Lock)
        shell: bash
        timeout-minutes: 10
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          mkdir -p /tmp/botuyo-locks
          cleanup() { kill 0 2>/dev/null; exit 1; }
          trap cleanup SIGTERM SIGINT SIGHUP
          flock -w 120 /tmp/botuyo-locks/mcp.lock bash -c '
            npm install
            npm run build

            PUBLISHED=$(npm show @botuyo/mcp version 2>/dev/null || echo "0.0.0")
            LOCAL=$(node -p "require(\"./package.json\").version")

            if [ "$LOCAL" != "$PUBLISHED" ]; then
              npm publish --access public
              echo "Published v$LOCAL to npm"
            else
              echo "Version $LOCAL already published — skipped"
            fi
          '

      - name: Notify Deploy Result
        if: always()
        shell: bash
        env:
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          DEPLOY_STATUS: ${{ job.status }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
        run: |
          python3 << 'PYEOF'
          import smtplib, ssl, os
          from email.mime.text import MIMEText
          from datetime import datetime, timezone, timedelta

          ar = timezone(timedelta(hours=-3))
          now = datetime.now(ar).strftime('%d/%m/%Y %H:%M:%S')

          status = os.environ['DEPLOY_STATUS']
          icon = '\u2705' if status == 'success' else '\u274c'

          body = f"""{icon} MCP Publish: {status.upper()}

          Fin:     {now} (AR)
          Commit:  {os.environ.get('COMMIT_MSG', 'N/A')}
          SHA:     {os.environ['COMMIT_SHA'][:8]}
          Author:  {os.environ['ACTOR']}
          Run:     {os.environ['RUN_URL']}
          """

          msg = MIMEText(body)
          msg['Subject'] = f'{icon} [MCP] Publish {status.upper()} — {now}'
          msg['From'] = 'BotUyo CI/CD <support@botuyo.com>'
          msg['To'] = os.environ['NOTIFICATION_EMAIL']

          ctx = ssl.create_default_context()
          with smtplib.SMTP_SSL('smtp.zoho.com', 465, context=ctx) as s:
              s.login('support@botuyo.com', os.environ['SMTP_PASSWORD'])
              s.send_message(msg)
          PYEOF
