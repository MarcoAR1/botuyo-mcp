name: Publish @botuyo/mcp to npm

on:
  push:
    branches: [main]
    paths: ['package.json']

concurrency:
  group: mcp-publish
  cancel-in-progress: true

jobs:
  publish:
    name: Build and publish @botuyo/mcp
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Check if version changed
        id: version_check
        run: |
          PUBLISHED=$(npm show @botuyo/mcp version 2>/dev/null || echo "0.0.0")
          LOCAL=$(node -p "require('./package.json').version")
          echo "published=$PUBLISHED" >> $GITHUB_OUTPUT
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          if [ "$LOCAL" != "$PUBLISHED" ]; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            echo "should_publish=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.version_check.outputs.should_publish == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip (version unchanged)
        if: steps.version_check.outputs.should_publish == 'false'
        run: echo "Version ${{ steps.version_check.outputs.local }} already published on npm — bump package.json to trigger a new publish."

      - name: Notify Result
        if: always()
        shell: bash
        env:
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          DEPLOY_STATUS: ${{ job.status }}
          PUBLISHED_VERSION: ${{ steps.version_check.outputs.local }}
          SHOULD_PUBLISH: ${{ steps.version_check.outputs.should_publish }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
        run: |
          python3 << 'PYEOF'
          import smtplib, ssl, os
          from email.mime.text import MIMEText

          status = os.environ['DEPLOY_STATUS']
          icon = '\u2705' if status == 'success' else '\u274c'
          version = os.environ.get('PUBLISHED_VERSION', '?')
          published = os.environ.get('SHOULD_PUBLISH', 'false') == 'true'

          action = f'Published v{version}' if published else f'Skipped (v{version} already on npm)'

          body = f"""{icon} MCP Publish: {status.upper()}

          Action: {action}
          Commit: {os.environ.get('COMMIT_MSG', 'N/A')}
          SHA:    {os.environ['COMMIT_SHA'][:8]}
          Author: {os.environ['ACTOR']}
          Run:    {os.environ['RUN_URL']}
          """

          msg = MIMEText(body)
          msg['Subject'] = f'{icon} MCP Publish \u2014 {status.upper()}'
          msg['From'] = 'BotUyo CI/CD <support@botuyo.com>'
          msg['To'] = os.environ['NOTIFICATION_EMAIL']

          ctx = ssl.create_default_context()
          with smtplib.SMTP_SSL('smtp.zoho.com', 465, context=ctx) as s:
              s.login('support@botuyo.com', os.environ['SMTP_PASSWORD'])
              s.send_message(msg)
          print(f'Email sent to {os.environ["NOTIFICATION_EMAIL"]}')
          PYEOF
