name: Publish @botuyo/mcp to npm

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'
      - '.github/workflows/publish.yml'

jobs:
  publish:
    name: Build and publish @botuyo/mcp
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Check if version changed
        id: version_check
        run: |
          PUBLISHED=$(npm show @botuyo/mcp version 2>/dev/null || echo "0.0.0")
          LOCAL=$(node -p "require('./package.json').version")
          echo "published=$PUBLISHED" >> $GITHUB_OUTPUT
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          if [ "$LOCAL" != "$PUBLISHED" ]; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            echo "should_publish=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.version_check.outputs.should_publish == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip (version unchanged)
        if: steps.version_check.outputs.should_publish == 'false'
        run: echo "Version ${{ steps.version_check.outputs.local }} already published on npm — bump package.json to trigger a new publish."
